<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 Para George 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2d0a1a 0%, #5a1a3a 50%, #3d1a2d 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* SOBRE */
        .envelope {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 200px;
            background: linear-gradient(135deg, #ff69b4 0%, #ffc0cb 50%, #ff1493 100%);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 40px rgba(220, 20, 60, 0.5);
            transition: all 0.3s;
            z-index: 100;
        }

        .envelope:hover {
            transform: translate(-50%, -50%) scale(1.05);
        }

        .envelope.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .envelope-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .envelope-hint {
            font-size: 14px;
            margin-top: 15px;
            opacity: 0.8;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* NOTA */
        .note {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #fff5f7 0%, #ffe0eb 100%);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(139, 0, 0, 0.4);
            z-index: 200;
            max-width: 400px;
            text-align: center;
            border: 3px solid #dc143c;
            transition: transform 0.6s ease-out;
        }

        .note.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .note-content {
            color: #8b0000;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .note-button {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.3s;
        }

        .note-button:hover {
            transform: scale(1.1);
        }

        /* PASSWORD */
        .password-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #2d0a1a 0%, #5a1a3a 100%);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            z-index: 200;
            max-width: 350px;
            text-align: center;
            border: 3px solid #dc143c;
            transition: transform 0.6s ease-out;
        }

        .password-box.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .password-label {
            color: #ffc0cb;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .password-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #dc143c;
            border-radius: 5px;
            background: #fff5f7;
            color: #8b0000;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }

        .password-input::placeholder {
            color: #daa0b3;
        }

        .password-button {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s;
            width: 100%;
        }

        .password-button:hover {
            transform: scale(1.05);
        }

        .error-msg {
            color: #ff1493;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        .error-msg.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* FUEGOS ARTIFICIALES */
        .fireworks {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 150;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            pointer-events: none;
        }

        /* LLUVIA */
        .rain {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 140;
            pointer-events: none;
        }

        .rain-item {
            position: absolute;
            font-weight: bold;
            font-size: 30px;
        }

        /* CORAZON */
        .heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            cursor: pointer;
            z-index: 130;
            transition: transform 0.3s;
            opacity: 0;
        }

        .heart:hover {
            transform: translate(-50%, -50%) scale(1.2);
        }

        .heart.show {
            opacity: 1;
        }

        .heart.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* MENSAJE FINAL */
        .final-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: #ffc0cb;
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            z-index: 125;
            text-shadow: 0 0 20px rgba(220, 20, 60, 0.8);
            transition: transform 0.8s ease-out;
        }

        .final-message.show {
            transform: translate(-50%, -50%) scale(1);
        }

        /* GALAXIA */
        .galaxy {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 120;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SOBRE -->
        <div class="envelope" id="envelope">
            <div class="envelope-text">Para: George 💌</div>
            <div class="envelope-hint">Presiona aquí ⚡</div>
        </div>

        <!-- NOTA -->
        <div class="note" id="note">
            <div class="note-content">
                Las mejores personas<br>merecen ser amadas.<br><br>
                <strong style="font-size: 20px;">Te amo 💕</strong>
            </div>
            <button class="note-button" id="noteBtn">Continuar</button>
        </div>

        <!-- PASSWORD -->
        <div class="password-box" id="passwordBox">
            <div class="password-label">⚠️ Acceso de Seguridad</div>
            <div class="password-label" style="font-size: 14px; margin-bottom: 20px;">Ingresa tu nombre para continuar</div>
            <input type="text" class="password-input" id="passwordInput" placeholder="¿Cuál es tu nombre?">
            <button class="password-button" id="passwordBtn">Verificar</button>
            <div class="error-msg" id="errorMsg">❌ Intenta de nuevo</div>
        </div>

        <!-- FUEGOS -->
        <div class="fireworks" id="fireworks"></div>

        <!-- LLUVIA -->
        <div class="rain" id="rain"></div>

        <!-- CORAZON -->
        <div class="heart" id="heart">💖</div>

        <!-- MENSAJE FINAL -->
        <div class="final-message" id="finalMessage">
            Te amo, George 💕✨
        </div>

        <!-- GALAXIA -->
        <canvas class="galaxy" id="galaxyCanvas"></canvas>
    </div>

    <script>
        // FASE 1: SOBRE
        const envelope = document.getElementById('envelope');
        const note = document.getElementById('note');

        envelope.addEventListener('click', () => {
            envelope.classList.add('hidden');
            note.classList.add('show');
        });

        // FASE 2: NOTA
        const noteBtn = document.getElementById('noteBtn');
        const passwordBox = document.getElementById('passwordBox');

        noteBtn.addEventListener('click', () => {
            note.classList.remove('show');
            setTimeout(() => {
                passwordBox.classList.add('show');
            }, 300);
        });

        // FASE 3: PASSWORD
        const passwordInput = document.getElementById('passwordInput');
        const passwordBtn = document.getElementById('passwordBtn');
        const errorMsg = document.getElementById('errorMsg');

        passwordBtn.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        function checkPassword() {
            const value = passwordInput.value.toLowerCase();
            if (value === 'george') {
                passwordBox.classList.remove('show');
                startFireworks();
            } else {
                errorMsg.classList.add('show');
                passwordInput.value = '';
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 1000);
            }
        }

        // FASE 4: FUEGOS ARTIFICIALES
        function startFireworks() {
            const fireworksContainer = document.getElementById('fireworks');
            
            for (let i = 0; i < 25; i++) {
                setTimeout(() => {
                    createFirework();
                }, i * 150);
            }

            function createFirework() {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight * 0.6;

                for (let i = 0; i < 40; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.innerHTML = Math.random() > 0.6 ? '❤️' : '✨';
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.fontSize = (15 + Math.random() * 20) + 'px';
                    fireworksContainer.appendChild(particle);

                    const angle = (i / 40) * Math.PI * 2;
                    const velocity = 4 + Math.random() * 6;
                    const vx = Math.cos(angle) * velocity;
                    const vy = Math.sin(angle) * velocity;
                    let px = x, py = y;
                    let opacity = 1;

                    const anim = setInterval(() => {
                        px += vx;
                        py += vy;
                        vy += 0.1;
                        opacity -= 0.03;

                        particle.style.left = px + 'px';
                        particle.style.top = py + 'px';
                        particle.style.opacity = opacity;

                        if (opacity <= 0) {
                            clearInterval(anim);
                            particle.remove();
                        }
                    }, 30);
                }
            }

            setTimeout(startRain, 3500);
        }

        // FASE 5: LLUVIA
        function startRain() {
            const rainContainer = document.getElementById('rain');
            const items = ['💖', '💕', 'T', 'e', 'A', 'm', 'o'];

            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const item = document.createElement('div');
                    item.className = 'rain-item';
                    item.innerHTML = items[Math.floor(Math.random() * items.length)];
                    item.style.left = Math.random() * window.innerWidth + 'px';
                    item.style.top = '-50px';
                    item.style.color = Math.random() > 0.5 ? '#dc143c' : '#ffc0cb';
                    rainContainer.appendChild(item);

                    let y = -50;
                    const speed = 2 + Math.random() * 2.5;
                    const anim = setInterval(() => {
                        y += speed;
                        item.style.top = y + 'px';

                        if (y > window.innerHeight) {
                            clearInterval(anim);
                            item.remove();
                        }
                    }, 30);
                }, i * 80);
            }

            setTimeout(showHeart, 4500);
        }

        // FASE 6: CORAZON
        function showHeart() {
            const heart = document.getElementById('heart');
            heart.classList.add('show');
        }

        const heart = document.getElementById('heart');
        heart.addEventListener('click', convertToGalaxy);

        function convertToGalaxy() {
            const heart = document.getElementById('heart');
            const finalMessage = document.getElementById('finalMessage');
            const fireworks = document.getElementById('fireworks');

            heart.classList.add('hidden');
            
            // Pequeña explosión de corazones
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerHTML = '💖';
                particle.style.left = window.innerWidth / 2 + 'px';
                particle.style.top = window.innerHeight / 2 + 'px';
                particle.style.fontSize = '20px';
                fireworks.appendChild(particle);

                const angle = Math.random() * Math.PI * 2;
                const distance = 100 + Math.random() * 200;
                const finalX = window.innerWidth / 2 + Math.cos(angle) * distance;
                const finalY = window.innerHeight / 2 + Math.sin(angle) * distance;

                const duration = 800;
                const startTime = Date.now();

                const anim = setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);

                    const currentX = window.innerWidth / 2 + (finalX - window.innerWidth / 2) * progress;
                    const currentY = window.innerHeight / 2 + (finalY - window.innerHeight / 2) * progress;

                    particle.style.left = currentX + 'px';
                    particle.style.top = currentY + 'px';
                    particle.style.opacity = 1 - progress;

                    if (progress >= 1) {
                        clearInterval(anim);
                        particle.remove();
                    }
                }, 30);
            }

            setTimeout(() => {
                finalMessage.classList.add('show');
                startGalaxy();
            }, 1000);
        }

        // FASE 7: GALAXIA
        function startGalaxy() {
            const canvas = document.getElementById('galaxyCanvas');
            const ctx = canvas.getContext('2d');

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];

            for (let i = 0; i < 150; i++) {
                particles.push({
                    angle: Math.random() * Math.PI * 2,
                    distance: Math.random() * 300,
                    speed: 0.01 + Math.random() * 0.03,
                    size: Math.random() * 3 + 1,
                    opacity: Math.random() * 0.5 + 0.5,
                    hue: Math.random() * 60 + 300
                });
            }

            function animate() {
                ctx.fillStyle = 'rgba(45, 10, 26, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                particles.forEach(p => {
                    p.angle += p.speed;
                    p.distance = Math.max(10, p.distance - 0.5);

                    const x = canvas.width / 2 + Math.cos(p.angle) * p.distance;
                    const y = canvas.height / 2 + Math.sin(p.angle) * p.distance;

                    ctx.fillStyle = `hsla(${p.hue}, 100%, 50%, ${p.opacity})`;
                    ctx.beginPath();
                    ctx.arc(x, y, p.size, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${p.opacity * 0.3})`;
                    ctx.beginPath();
                    ctx.arc(x, y, p.size * 3, 0, Math.PI * 2);
                    ctx.fill();
                });

                if (particles[0].distance > 10) {
                    requestAnimationFrame(animate);
                }
            }

            animate();
        }
    </script>
</body>
</html>
